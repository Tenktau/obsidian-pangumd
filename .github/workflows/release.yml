name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: obsidian-pangu4md

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Create release package
        run: |
          mkdir ${{ env.PLUGIN_NAME }}

          cp -r dist/* \
            ${{ env.PLUGIN_NAME }}

          zip -r ${{ env.PLUGIN_NAME }}.zip \
            ${{ env.PLUGIN_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            dist/manifest.json
            dist/versions.json
            ${{ env.PLUGIN_NAME }}.zip